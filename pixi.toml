[workspace]
authors = ["Johannes Koester <johannes.koester@uni-due.de>"]
channels = ["conda-forge", "bioconda"]
name = "snakemake-plugin-catalog"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
build = "sphinx-build source build"
build-single = { cmd = "sphinx-build source build", env = { TEST_PACKAGES = "snakemake-executor-plugin-cluster-generic" }}
qc = "ruff format --check && ruff check"

_style-python = "ruff format && ruff check --fix"
_style-md = { cmd = "fd . --type file --extension md --exec mdformat --wrap 80", default-environment = "style" }
style = { depends-on = ["_style-md", "_style-python"] }
apply-qc = "style"

[dependencies]
sphinx = ">=8.2.3,<9"
python = ">=3.11.0,<4"
ratelimit = ">=2.2.1,<3"
m2r2 = ">=0.3.4,<0.4"
cmake = ">=4.1.1,<5"
gcc_linux-64 = ">=15.1.0,<16"
pkgconfig = ">=1.5.5,<2"
ruff = ">=0.12.11,<0.13"
gitpython = ">=3.1.46,<4"
git = ">=2.53.0,<3"

[pypi-dependencies]
sphinxawesome-theme = ">=5.3.2, <6"
pypi-simple = ">=1.7.0, <2"

[feature.style.dependencies]
mdformat = ">=0.7.22,<0.8"
mdformat-gfm = "*"
fd-find = ">=10.3.0,<11"

[environments]
style = { features = ["style"], no-default-feature = true }
